services:
  postgres-doculoc:
    image: bitnami/postgresql:latest
    container_name: doculoc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: doculoc
      POSTGRES_PASSWORD: doculoc
      POSTGRES_DB: doculoc
    ports:
      - "5432:5432"
    volumes:
      - doculoc_postgres_data:/var/lib/postgresql/data

  api-doculoc:
    build:
      context: .
      target: dev
    container_name: doculoc-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3333
      DATABASE_URL: postgresql://doculoc:doculoc@postgres-doculoc:5432/doculoc?schema=public
      LIBREOFFICE_PATH: /usr/bin/soffice
    ports:
      - "3333:3333"
    depends_on:
      - postgres-doculoc
    volumes:
      - .:/app
      - /app/node_modules
      - ./storage/contracts:/app/storage/contracts

volumes:
  doculoc_postgres_data: